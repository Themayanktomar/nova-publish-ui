<main class="page-shell auth-page">
  <section class="auth-visual">
    <a class="brand" routerLink="/">
      <span class="brand-mark">NP</span>
      <span class="brand-name">NovaPublish</span>
    </a>
    <div>
      <p class="eyebrow">Welcome back</p>
      <h1>Continue your publishing QA review.</h1>
      <p>
        Sign in to review alt text issues, approve editor updates, and keep your accessibility
        workflow moving.
      </p>
    </div>
  </section>

  <section class="auth-panel" aria-labelledby="login-title">
    <div class="form-card">
      <h2 id="login-title">Login</h2>
      <p class="form-intro">Use your Gmail and password to access your workspace.</p>

      <form>
        <label for="email">Gmail address</label>

        <input
          id="email"
          type="email"
          name="email"
          placeholder="name@gmail.com"
          [(ngModel)]="email"
        />

        <label for="password">Password</label>

        <input
          id="password"
          type="password"
          name="password"
          placeholder="Enter your password"
          [(ngModel)]="password"
        />

        <button class="btn btn-primary" type="button" (click)="login()">Login</button>
      </form>

      <p class="switch-link">
        New to NovaPublish?
        <a routerLink="/signup">Create an account</a>
      </p>
    </div>
  </section>
</main>
